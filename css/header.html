<!-- =====================================================
     HEADER - Componente reutilizable
     Contiene: logo, buscador global, menú de navegación y botón hamburguesa.
     Estilos: sticky en la parte superior.
     Cambios: colores actualizados a la nueva paleta (azul oscuro elegante).
     ===================================================== -->
<header class="site-header">
    <div class="container header-container">
        <!-- Logo -->
        <div class="logo">
            <a href="index.html">
                <img src="images/logos/baner_blanco_v3.png" alt="Ridgemugs Colombia">
            </a>
        </div>
        <!-- Buscador global (funcionalidad en search.js) -->
        <div class="search-global">
            <input type="text" id="globalSearchInput" placeholder="🔍 Buscar productos, servicios o equipos...">
        </div>
        <!-- Menú de navegación principal -->
        <nav class="nav-links" id="mainNav">
            <a href="index.html" class="nav-link">Nuestra Idea</a>
            <a href="products.html" class="nav-link">Productos</a>
            <a href="services.html" class="nav-link">Servicios</a>
            <a href="contact.html" class="nav-link">Contáctenos</a>
        </nav>
        <!-- Botón hamburguesa para móviles -->
        <div class="hamburger" id="hamburger">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </div>
</header>
